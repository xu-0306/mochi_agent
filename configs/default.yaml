# Mochi 預設設定檔
# Windows 預設使用 mochi/config.yaml；Linux/macOS 預設使用 ~/.mochi/config.yaml。
# 可複製此檔案到對應位置後依需求修改。

# 預設模型規格
# 格式：
#   ollama:<model>         - 使用本地 Ollama
#   /path/to/model.gguf   - 使用 GGUF 本地模型（Phase 3）
#   http://host/v1        - 使用 OpenAI-compatible API（Phase 3）
model: "ollama:llama3.2"

# 模型首次啟動 metadata。保留上方 model 以相容既有 CLI/API；
# WebGUI 或部署腳本應檢查模型可用性，不可用時進入 provider setup。
model_setup:
  mode: "configured_or_setup"
  default_provider: "ollama"
  default_model: "llama3.2"
  default_model_spec: "ollama:llama3.2"
  setup_required: true
  fallback_chain:
    - "user_config"
    - "ollama_tags"
    - "openai_compatible_provider"

# 語言、地區與顯示層預設
locale_defaults:
  region_profile: "global"        # global = 不偏特定地區；可由 MOCHI_REGION_PROFILE 覆蓋
  ui_locale: "auto"               # auto = 由瀏覽器/客戶端偵測
  ui_locale_fallback: "en-US"     # 無法偵測時的 UI fallback
  response_language: "same_as_user" # 預設跟隨使用者輸入語言
  default_tts_voice: "af_heart"
  timezone: "auto"                # 儲存層仍保留 UTC；顯示層再轉換

# Agent 核心設定
agent:
  system_prompt: |
    You are Mochi, an efficient and honest AI assistant.
    Reply in the same language as the user unless they request otherwise.
  max_react_iterations: 10
  max_context_tokens: 3000
  temperature: 0.7
  max_tokens: 4096
  top_p: 1.0
  min_p: 0.0
  top_k: 0
  frequency_penalty: 0.0
  presence_penalty: 0.0
  repeat_penalty: 1.0
  show_token_stats: false
  presets:
    - name: "default"
      system_prompt: ""
      temperature: 0.7
      max_tokens: 4096
      top_p: 1.0
      min_p: 0.0
      top_k: 0
      frequency_penalty: 0.0
      presence_penalty: 0.0
      repeat_penalty: 1.0
  active_preset: "default"

# Ollama 後端設定
ollama:
  base_url: "http://localhost:11434"
  timeout: 120.0

# GGUF 後端設定（Phase 3）
gguf:
  n_ctx: 4096
  n_gpu_layers: -1    # -1 = 全部 GPU，0 = 純 CPU
  n_threads: null     # null = 自動
  n_batch: 512
  n_ubatch: 512
  n_threads_batch: null
  flash_attn: false
  offload_kqv: true
  use_mmap: true
  use_mlock: false

# HuggingFace 後端設定（Phase 3）
huggingface:
  device: "auto"
  torch_dtype: "auto"
  trust_remote_code: false

# 語音管線設定（Phase 4，預設關閉）
local_models:
  roots: []
  scan_max_depth: 3
  scan_max_entries: 500
  runtime: "inprocess"
  idle_unload_enabled: false
  idle_unload_seconds: 300

voice:
  enabled: false
  stt_backend: "faster-whisper"   # 可選：auto/faster-whisper/openai-api/openai-whisper/qwen-asr/vosk/whisper-cpp/whisperlivekit
  stt_model: "medium"             # backend-specific model name / repo id / local path alias
  stt_language: "auto"
  stt_device: "auto"
  stt_openai_base_url: null       # 只在 stt_backend=openai-api 時使用，可填 http://host/v1
  stt_openai_api_key: null        # 只在 stt_backend=openai-api 時使用
  stt_openai_timeout: 60.0        # openai-api transcription HTTP timeout（秒）
  tts_backend: "kokoro-tts"       # 可選：auto/coqui-tts/edge-tts/external-api/kokoro-tts/openai-tts/piper
  tts_model: null                 # 只在 coqui-tts/openai-tts 等需要模型名的後端使用
  tts_voice: "af_heart"
  tts_language: null              # 只在特定 TTS 後端使用（例如 coqui-tts）
  tts_speed: 1.0
  tts_use_gpu: false              # 只在支援 GPU 的本地 TTS 後端使用
  tts_kokoro_lang_code: "a"       # 只在 tts_backend=kokoro-tts 時使用
  tts_split_pattern: "\\n+"       # 只在 tts_backend=kokoro-tts 時使用
  tts_openai_base_url: null       # 只在 tts_backend=openai-tts 時使用，可填 http://host/v1
  tts_openai_api_key: null        # 只在 tts_backend=openai-tts 時使用
  tts_openai_timeout: 60.0        # openai-tts HTTP timeout（秒）
  tts_openai_response_format: "pcm" # 只在 tts_backend=openai-tts 時使用；可選 pcm/wav
  vad_threshold: 0.5
  vad_min_speech_ms: 250
  vad_max_silence_ms: 700
  sample_rate: 16000
  channels: 1

# 工具系統設定
tools:
  extra_tools_dirs: []
  # 搜尋引擎
  web_search_engine: "tavily"             # 可選: tavily/serper/jina/exa/brave/searxng/duckduckgo
  web_search_fallback_engines:            # 主引擎失敗時依序嘗試
    - "brave"
    - "duckduckgo_html"
  web_search_tavily_api_key:              # env: MOCHI_TAVILY_API_KEY
  web_search_serper_api_key:              # env: MOCHI_SERPER_API_KEY
  web_search_jina_api_key:                # env: MOCHI_JINA_API_KEY
  web_search_exa_api_key:                 # env: MOCHI_EXA_API_KEY
  web_search_brave_api_key:               # env: MOCHI_BRAVE_API_KEY
  web_search_searxng_base_url:            # SearXNG 實例 URL
  web_search_language:                    # 搜尋語言偏好 (e.g. zh-TW)
  web_search_region:                      # 搜尋地區偏好 (e.g. tw)
  # 網頁擷取
  web_fetch_extractor: "trafilatura"      # 可選: trafilatura/jina_reader/htmlparser
  web_fetch_jina_api_key:                 # env: 可與 web_search_jina_api_key 共用
  # 文獻搜尋
  semantic_scholar_api_key:               # env: MOCHI_S2_API_KEY
  pubmed_api_key:                         # env: MOCHI_PUBMED_API_KEY
  pubmed_email:                           # NCBI E-utilities 聯繫 email
  crossref_mailto:                        # Crossref polite pool email
  # HTTP 共用
  http_timeout: 20.0
  http_max_retries: 3
  http_backoff_base: 1.0
# 記憶系統設定
memory:
  max_short_term_messages: 50
  fts_top_k: 5

# 持續學習設定
learning:
  enabled: true
  auto_extract_skills: true
  auto_sync_filesystem_skills: true
  min_steps_for_extraction: 3
  trajectory_retention_days: 30
  skill_improvement_threshold: 0.7
  max_skills: 500

# 頻道適配設定（Phase 4.5，預設關閉）
channels:
  discord:
    enabled: false
    text_enabled: true
    voice_enabled: false
    bot_token: null             # 請設為環境變數 DISCORD_BOT_TOKEN
    allowed_guild_ids: []      # 空列表 = 全部允許
    allowed_channel_ids: []    # 空列表 = 全部允許
    allowed_voice_channel_ids: []
    allowed_user_ids: []
    rate_limit_per_user: 10
    message_mode: "mentions_only" # guild 文字收訊策略：all_messages / mentions_only / slash_only
    auto_join_policy: "manual_only"
    voice_auto_reply: true
    voice_stt_enabled: true
    voice_tts_enabled: true
  telegram:
    enabled: false
    bot_token: null             # 請設為環境變數 TELEGRAM_BOT_TOKEN
    allowed_chat_ids: []
    allowed_user_ids: []
    rate_limit_per_user: 10

# 安全設定
security:
  autonomy_mode: "trusted_workspace"
  require_approval_for_file_write: false
  require_approval_for_exec: true
  max_file_write_size_mb: 10.0
  file_ops_scope: "workspace"
  file_undo_max_size_mb: 2.0

# Web API 伺服器設定
web:
  host: "0.0.0.0"
  port: 8000
  cors_origins:
    - "http://localhost:3000" # development default; override in production config/env
  reload: false

# 路徑設定
# 未設定時會依平台選擇：
#   Windows: mochi/config.yaml, mochi/workspace, mochi/sessions,
#            mochi/skills, mochi/plugins, mochi/memory/memory.db
#   Linux/macOS: ~/.mochi/config.yaml, ~/.mochi, ~/.mochi/sessions,
#                ~/.mochi/skills, ~/.mochi/plugins, ~/.mochi/memory.db
# 可用 MOCHI_WORKSPACE_DIR / MOCHI_SESSIONS_DIR / MOCHI_SKILLS_DIR /
# MOCHI_PLUGINS_DIR 或本檔明確覆蓋。

# 日誌等級：DEBUG / INFO / WARNING / ERROR
log_level: "INFO"
